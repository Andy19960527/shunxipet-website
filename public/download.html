<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSM发货报告下载</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .download-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        .download-btn {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            border: none;
            padding: 18px 30px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
            text-decoration: none;
            display: block;
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.6);
        }
        .download-btn.secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            box-shadow: none;
        }
        .download-btn.secondary:hover {
            background: #667eea;
            color: white;
        }
        .btn-icon {
            font-size: 24px;
            margin-right: 10px;
        }
        .btn-text {
            display: block;
            font-size: 14px;
            font-weight: normal;
            opacity: 0.9;
            margin-top: 5px;
        }
        .info {
            margin-top: 20px;
            padding: 15px;
            background: #e3f2fd;
            border-radius: 10px;
            border-left: 4px solid #2196F3;
            text-align: left;
            font-size: 14px;
            color: #1976D2;
        }
        .info strong {
            display: block;
            margin-bottom: 8px;
            font-size: 15px;
        }
        .note {
            margin-top: 15px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 10px;
            border-left: 4px solid #ffc107;
            text-align: left;
            font-size: 14px;
            color: #856404;
        }
        .note strong {
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PSM 中文报告</h1>
        <p class="subtitle">英文发货报告中文翻译版本</p>

        <div class="download-options">
            <a href="psm-report-simple.html" class="download-btn" target="_blank">
                <span class="btn-icon">🌐</span>
                <span>查看完整报告 (HTML格式)</span>
                <span class="btn-text">推荐使用 - 在浏览器中打开查看</span>
            </a>

            <a href="psm-report-chinese.txt" class="download-btn secondary">
                <span class="btn-icon">📝</span>
                <span>下载文本版本</span>
                <span class="btn-text">纯文本格式，任何编辑器可打开</span>
            </a>
        </div>

        <div class="info">
            <strong>💡 推荐使用方式:</strong>
            1. 点击"查看完整报告"<br>
            2. 报告将在新窗口中打开<br>
            3. 可以直接打印，或复制内容到Word<br>
            4. 支持保存为PDF格式
        </div>

        <div class="note">
            <strong>⚠️ 注意:</strong>
            如果打开的HTML页面中文显示为乱码，请下载文本版本查看。文本版本不会有编码问题。
        </div>
    </div>
</body>
</html>
