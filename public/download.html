<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSM发货报告下载</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft YaHei", "微软雅黑", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .download-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        .download-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 30px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            text-decoration: none;
            display: block;
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        .download-btn.primary {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
        }
        .download-btn.primary:hover {
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.6);
        }
        .download-btn.secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            box-shadow: none;
        }
        .download-btn.secondary:hover {
            background: #667eea;
            color: white;
        }
        .btn-icon {
            font-size: 24px;
            margin-right: 10px;
        }
        .btn-text {
            display: block;
            font-size: 14px;
            font-weight: normal;
            opacity: 0.9;
            margin-top: 5px;
        }
        .info {
            margin-top: 20px;
            padding: 15px;
            background: #e3f2fd;
            border-radius: 10px;
            border-left: 4px solid #2196F3;
            text-align: left;
            font-size: 14px;
            color: #1976D2;
        }
        .info strong {
            display: block;
            margin-bottom: 8px;
            font-size: 15px;
        }
        .warning {
            margin-top: 15px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 10px;
            border-left: 4px solid #ffc107;
            text-align: left;
            font-size: 14px;
            color: #856404;
        }
        .warning strong {
            display: block;
            margin-bottom: 5px;
        }
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 PSM发货报告</h1>
        <p class="subtitle">英文报告中文翻译版本</p>

        <div class="download-options">
            <a href="psm-report-chinese.html" class="download-btn primary" target="_blank">
                <span class="btn-icon">🌐</span>
                <span>在浏览器中查看完整报告</span>
                <span class="btn-text">推荐使用 - 支持打印和复制</span>
            </a>

            <button class="download-btn" onclick="alert('请在浏览器中打开的报告页面使用打印功能，然后选择"另存为PDF"')">
                <span class="btn-icon">📄</span>
                <span>下载为PDF格式</span>
                <span class="btn-text">在报告页面点击打印，选择"另存为PDF"</span>
            </button>

            <button class="download-btn" onclick="window.location.href='psm-report-chinese.txt';">
                <span class="btn-icon">📝</span>
                <span>下载文本版本</span>
                <span class="btn-text">纯文本格式，任何编辑器可打开</span>
            </button>
        </div>

        <div class="info">
            <strong>💡 推荐使用方式：</strong>
            1. 点击"在浏览器中查看完整报告"<br>
            2. 报告将在新窗口中打开，格式清晰，无乱码<br>
            3. 可以直接打印，或复制内容到Word<br>
            4. 支持保存为PDF格式
        </div>

        <div class="warning">
            <strong>⚠️ 注意：</strong>
            之前的Word文档版本可能存在编码兼容性问题。HTML版本已优化，可在任何设备上正常显示中文。
        </div>
    </div>
</body>
</html>
